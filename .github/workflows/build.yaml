name: Wails build

on:
  release:
    types: [ created ]

env:
  NODE_OPTIONS: "--max-old-space-size=4096"
  APP_NAME: 'HDFS-King'
  APP_WORKING_DIRECTORY: '.'
  GO_VERSION: '1.25'
  NODE_VERSION: "22.x"

# https://docs.github.com/en/actions/using-github-hosted-runners/using-github-hosted-runners/about-github-hosted-runners#supported-runners-and-hardware-resources
jobs:
  build-windows:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest   # amd64 / x64
            suffix: windows-x64
          - os: windows-11-arm   # ARM64
            suffix: windows-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          submodules: recursive

      - name: Install 7-Zip
        run: choco install 7zip

      - name: GoLang
        uses: actions/setup-go@v4
        with:
          check-latest: true
          go-version: ${{ env.GO_VERSION }}

      - name: NodeJS
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build & Compress
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          cd ${{ env.APP_WORKING_DIRECTORY }}
          wails build -o ${{ env.APP_NAME }}.exe
          # 大小写不敏感地复制 README / LICENSE（文件不存在时跳过）
          Get-ChildItem -Path . -File | Where-Object { $_.Name -imatch '^readme' } | Select-Object -First 1 | ForEach-Object { Copy-Item $_.FullName build\bin\ -ErrorAction SilentlyContinue }
          Get-ChildItem -Path . -File | Where-Object { $_.Name -imatch '^license' } | Select-Object -First 1 | ForEach-Object { Copy-Item $_.FullName build\bin\ -ErrorAction SilentlyContinue }
          & "C:\Program Files\7-Zip\7z.exe" a -t7z "${{ env.APP_NAME }}-${{ github.ref_name }}-${{ matrix.suffix }}.7z" ".\build\bin\*" -r

      - name: Upload
        uses: softprops/action-gh-release@v1
        with:
          files: "*.7z"
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-13       # Intel x86_64
            suffix: macos-x64
            platform: darwin/amd64
          - os: macos-latest   # Apple Silicon ARM64 (M 系列)
            suffix: macos-arm64
            platform: darwin/arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          submodules: recursive

      - name: GoLang
        uses: actions/setup-go@v4
        with:
          check-latest: true
          go-version: ${{ env.GO_VERSION }}

      - name: NodeJS
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build & Compress
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          cd ${{ env.APP_WORKING_DIRECTORY }}
          wails build -platform ${{ matrix.platform }} -o ${{ env.APP_NAME }}
          chmod +x build/bin/*/Contents/MacOS/*
          mkdir -p _build/ _dist/
          cp -r ./build/bin/${{ env.APP_NAME }}.app _build/
          brew install create-dmg
          create-dmg \
            --no-internet-enable \
            --volname "${{ env.APP_NAME }}" \
            --volicon "_build/${{ env.APP_NAME }}.app/Contents/Resources/iconfile.icns" \
            --window-pos 400 400 \
            --window-size 660 450 \
            --icon "${{ env.APP_NAME }}.app" 180 180 \
            --icon-size 100 \
            --hide-extension "${{ env.APP_NAME }}.app" \
            --app-drop-link 480 180 \
            "_dist/${{ env.APP_NAME }}-${{ github.ref_name }}-${{ matrix.suffix }}.dmg" \
            "_build/"

      - name: Upload
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ env.APP_WORKING_DIRECTORY }}/_dist/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04       # amd64 / x64
            suffix: ubuntu-x64
          - os: ubuntu-22.04-arm   # ARM64
            suffix: ubuntu-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          submodules: recursive

      - name: GoLang
        uses: actions/setup-go@v4
        with:
          check-latest: true
          go-version: ${{ env.GO_VERSION }}

      - name: NodeJS
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build & Compress
        run: |
          sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev build-essential
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          cd ${{ env.APP_WORKING_DIRECTORY }}
          wails build -o ${{ env.APP_NAME }}
          mkdir -p _temp_dist
          cp -r build/bin/* _temp_dist/
          # 大小写不敏感地复制 README / LICENSE（文件不存在时跳过）
          find . -maxdepth 1 -type f | grep -i '^./readme' | head -1 | xargs -r -I{} cp {} _temp_dist/
          find . -maxdepth 1 -type f | grep -i '^./license' | head -1 | xargs -r -I{} cp {} _temp_dist/
          chmod +x _temp_dist/*
          cd _temp_dist/
          tar -zcvf ../${{ env.APP_NAME }}-${{ github.ref_name }}-${{ matrix.suffix }}.tar.gz *

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: "*.tar.gz"
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
